<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <title>FTF Custom Values - Dark Edition</title>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="application-name" content="FTF Values">
    <meta name="apple-mobile-web-app-title" content="FTF Values">
    <meta name="theme-color" content="#060913">
    <meta name="msapplication-navbutton-color" content="#060913">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="icon" sizes="192x192" href="https://via.placeholder.com/192">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192">
    
    <style>
        .hide-mode #criador-form,
        .hide-mode .btn-aba-container,
        .hide-mode #btn-exportar-container,
        .hide-mode #search-container,
        .hide-mode .btn-deletar,
        .hide-mode .btn-acoes-card,
        .hide-mode #btn-limpar-tudo { display: none !important; }

        .form-tabs { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 1px solid #1a2235; padding-bottom: 8px; }
        .form-tab-btn { background: transparent; color: #62697e; border: none; padding: 6px 12px; cursor: pointer; font-weight: bold; font-size: 13px; border-radius: 4px; }
        .form-tab-btn.active { background: #1c2336; color: #ffa502; border: 1px solid #2d3854; }

        /* --- ESTÉTICA EXCLUSIVA DO CHANGELOG --- */
        .changelog-card { background-color: #0b0f19; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #1a2235; }
        .changelog-header { margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .changelog-header h2 { color: #ffffff; margin: 0; font-size: 20px; font-weight: 700; }
        .changelog-date { color: #62697e; font-size: 13px; }
        .changelog-list { display: flex; flex-direction: column; gap: 14px; }
        .log-row { display: flex; align-items: flex-start; gap: 12px; }
        .log-icon-box { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 15px; }
        .log-content { display: flex; flex-direction: column; gap: 2px; }
        .log-title { font-size: 11px; font-weight: 700; }
        .log-text { color: #cbd5e1; margin: 0; font-size: 13px; }

        /* Cores Temáticas do Log */
        .type-increase .log-icon-box { background-color: rgba(46, 213, 115, 0.15); color: #2ed573; }
        .type-increase .log-title { color: #2ed573; }
        .type-decrease .log-icon-box { background-color: rgba(255, 71, 87, 0.15); color: #ff4757; }
        .type-decrease .log-title { color: #ff4757; }
        .type-demand .log-icon-box { background-color: rgba(255, 165, 2, 0.15); color: #ffa502; }
        .type-demand .log-title { color: #ffa502; }
        .type-description .log-icon-box { background-color: rgba(53, 162, 235, 0.15); color: #35a2eb; }
        .type-description .log-title { color: #35a2eb; }
        .type-other .log-icon-box { background-color: rgba(98, 105, 126, 0.15); color: #62697e; }
        .type-other .log-title { color: #62697e; }
    </style>
</head>
<body style="background-color: #060913; color: #ffffff; font-family: sans-serif; padding: 20px; margin: 0;">

    <div style="text-align: center; margin-bottom: 30px;">
        <h1 style="color: #ffa502; font-size: 42px; margin-bottom: 5px; font-weight: bold; letter-spacing: 1px;">FTF Custom Values 👑</h1>
        <p style="color: #62697e; margin: 0;">O seu ranking personalizado, justo e sem manipulação</p>
    </div>

    <div style="text-align: center; margin-bottom: 20px; display: flex; justify-content: center; gap: 10px;">
        <button id="togglePrintBtn" onclick="togglePrintMode()" style="background: #1c2336; color: #ffa502; border: 1px solid #ffa502; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px;">Modo Print</button>
        <button id="btn-limpar-tudo" onclick="resetarParaPadraoCodigo()" style="background: #ff4757; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px;">⚠️ Restaurar Tudo da Lista</button>
    </div>

    <div id="search-container" style="max-width: 450px; margin: 0 auto 20px auto; text-align: center; display: flex; gap: 10px; justify-content: center; width: 95%;">
        <input type="text" id="barraPesquisa" placeholder="🔍 Pesquisar marreta pelo nome..." oninput="carregarCardsSalvos()" style="flex: 2; padding: 12px; background: #121826; color: #fff; border: 1px solid #ffa502; border-radius: 8px; font-size: 15px;">
        
        <select id="ordenacaoLista" onchange="ordenarEAtualizar()" style="flex: 1; padding: 12px; background: #121826; color: #fff; border: 1px solid #ffa502; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer;">
            <option value="padrao">🔢 Ordem Padrão</option>
            <option value="nome-az">🔤 Nome (A-Z)</option>
            <option value="nome-za">🔤 Nome (Z-A)</option>
            <option value="valor-alto">📈 Valor (Maior-Menor)</option>
            <option value="valor-baixo">📉 Valor (Menor-Maior)</option>
        </select>
    </div>

    <div id="criador-form" style="background-color: #0b0f19; padding: 20px; border-radius: 10px; border: 1px solid #1a2235; max-width: 450px; margin: 0 auto 40px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
        
        <div class="form-tabs">
            <button class="form-tab-btn active" id="tab-unico" onclick="mudarAbaForm('unico')">Individual</button>
            <button class="form-tab-btn" id="tab-massa" onclick="mudarAbaForm('massa')">Adicionar Vários Links Extra 🚀</button>
            <button class="form-tab-btn" id="tab-changelog" onclick="mudarAbaForm('changelog')">Changelog / Updates 🔄</button>
        </div>

        <div id="form-individual">
            <h3 style="margin-top: 0; color: #ffa502; margin-bottom: 15px;">Adicionar Novo Item Avulso</h3>
            <input type="text" id="nomeItem" placeholder="Nome do Item" style="width: 95%; padding: 10px; margin-bottom: 12px; background: #121826; color: #fff; border: 1px solid #232f4b; border-radius: 6px;">
            <input type="text" id="linkImagem" placeholder="Link da Imagem (URL)" style="width: 95%; padding: 10px; margin-bottom: 12px; background: #121826; color: #fff; border: 1px solid #232f4b; border-radius: 6px;">
            <input type="text" id="valorItem" placeholder="Valor em FV" style="width: 95%; padding: 10px; margin-bottom: 12px; background: #121826; color: #fff; border: 1px solid #232f4b; border-radius: 6px;">

            <label style="color: #8fa0c4; font-size: 14px; display: block; margin-bottom: 5px;">Raridade do Item:</label>
            <select id="raridadeItem" style="width: 100%; padding: 10px; margin-bottom: 12px; background: #121826; color: #fff; border: 1px solid #232f4b; border-radius: 6px;">
                <option value="legendary">⭐ Legendary</option>
                <option value="epics">✨ Epics</option>
                <option value="rares">💎 Rares</option>
                <option value="commons">📦 Commons</option>
            </select>

            <label style="color: #8fa0c4; font-size: 14px; display: block; margin-bottom: 5px;">Demanda (Ex: 4.5):</label>
            <input type="text" id="demandaNota" placeholder="Ex: 4.5" style="width: 95%; padding: 10px; margin-bottom: 12px; background: #121826; color: #fff; border: 1px solid #232f4b; border-radius: 6px;">

            <label style="color: #8fa0c4; font-size: 14px; display: block; margin-bottom: 5px;">Tendência de Valor:</label>
            <select id="tendenciaValor" style="width: 100%; padding: 10px; margin-bottom: 12px; background: #121826; color: #fff; border: 1px solid #232f4b; border-radius: 6px;">
                <option value="none">Estável / Sem Setinha</option>
                <option value="subiu">Subiu (↑ Verde)</option>
                <option value="caiu">Caiu (↓ Vermelho)</option>
                <option value="corrigido">Corrigido (* Amarelo)</option>
            </select>

            <label style="color: #8fa0c4; font-size: 14px; display: block; margin-bottom: 5px;">Status Especial:</label>
            <select id="statusItem" style="width: 100%; padding: 10px; margin-bottom: 12px; background: #121826; color: #fff; border: 1px solid #232f4b; border-radius: 6px;">
                <option value="none">Nenhum</option>
                <option value="overpaid">Overpaid For (📈)</option>
                <option value="underpaid">Underpaid For (📉)</option>
                <option value="niche">Niche (💎 Raro)</option>
            </select>

            <input type="text" id="estabilidadeItem" placeholder="Estabilidade (Ex: Stable)" style="width: 95%; padding: 10px; margin-bottom: 12px; background: #121826; color: #fff; border: 1px solid #232f4b; border-radius: 6px;">
            <button type="button" onclick="criarNovoCard()" style="width: 100%; padding: 12px; background: #ffa502; color: black; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 15px;">Adicionar Item ✨</button>
        </div>

        <div id="form-massa" style="display: none;">
            <h3 style="margin-top: 0; color: #ffa502; margin-bottom: 5px;">Importador Extra</h3>
            <p style="color: #62697e; font-size: 12px; margin-bottom: 15px;">Quer adicionar mais links no futuro? Cole aqui:</p>
            <textarea id="listaLinksMassa" rows="8" placeholder="Cole os links extras aqui..." style="width: 95%; padding: 10px; background: #121826; color: #fff; border: 1px solid #232f4b; border-radius: 6px; font-family: monospace; font-size: 12px; margin-bottom: 15px; resize: vertical;"></textarea>
            <button type="button" onclick="importarLinksEmMassa()" style="width: 100%; padding: 12px; background: #2ed573; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 15px;">Adicionar à Lista 🚀</button>
        </div>

        <div id="form-changelog" style="display: none;">
            <h3 style="margin-top: 0; color: #ffa502; margin-bottom: 15px;">Gerar Card de Changelog</h3>
            
            <input type="text" id="logVersion" placeholder="Versão (Ex: Version 3.8)" style="width: 95%; padding: 10px; margin-bottom: 12px; background: #121826; color: #fff; border: 1px solid #232f4b; border-radius: 6px;">
            <input type="text" id="logDate" placeholder="Data (Ex: June 29th, 2026)" style="width: 95%; padding: 10px; margin-bottom: 12px; background: #121826; color: #fff; border: 1px solid #232f4b; border-radius: 6px;">
            <input type="text" id="logItemName" placeholder="Nome do Item (Ex: Gothic Bouquet)" style="width: 95%; padding: 10px; margin-bottom: 12px; background: #121826; color: #fff; border: 1px solid #232f4b; border-radius: 6px;">
            
            <label style="color: #8fa0c4; font-size: 14px; display: block; margin-bottom: 5px;">Ação do Log:</label>
            <select id="logActionType" onchange="alternarCamposLog()" style="width: 100%; padding: 10px; margin-bottom: 12px; background: #121826; color: #fff; border: 1px solid #232f4b; border-radius: 6px;">
                <option value="increase">Value Increase (↑)</option>
                <option value="decrease">Value Decrease (↓)</option>
                <option value="demand">Demand Change (Estrelas)</option>
                <option value="description">Description Change (Status)</option>
                <option value="bugfix">Bug Fix</option>
                <option value="other">Other / Correction (*)</option>
            </select>

            <input type="text" id="logValue" placeholder="Novo Valor (Ex: 230)" style="width: 95%; padding: 10px; margin-bottom: 12px; background: #121826; color: #fff; border: 1px solid #232f4b; border-radius: 6px;">
            
            <select id="logDemand" style="display: none; width: 100%; padding: 10px; margin-bottom: 12px; background: #121826; color: #fff; border: 1px solid #232f4b; border-radius: 6px;">
                <option value="0 stars">0 Stars</option><option value="1 star">1 Star</option><option value="2 stars">2 Stars</option>
                <option value="3 stars">3 Stars</option><option value="4 stars">4 Stars</option><option value="5 stars">5 Stars</option>
            </select>

            <select id="logStatus" style="display: none; width: 100%; padding: 10px; margin-bottom: 12px; background: #121826; color: #fff; border: 1px solid #232f4b; border-radius: 6px;">
                <option value="Rising">Rising</option><option value="Doing Well">Doing Well</option><option value="Improving">Improving</option>
                <option value="Stable">Stable</option><option value="Fluctuating">Fluctuating</option><option value="Struggling">Struggling</option>
                <option value="Receding">Receding</option><option value="Dropping">Dropping</option><option value="Overpaid For">Overpaid For</option>
                <option value="Underpaid For">Underpaid For</option><option value="Niche">Niche</option>
            </select>

            <button type="button" onclick="adicionarCardChangelog()" style="width: 100%; padding: 12px; background: #ffa502; color: black; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 15px;">Publicar Atualização 🔄</button>
        </div>

    </div>

    <hr style="border: 1px solid #1a2235; margin: 40px 0;">

    <div style="max-width: 1200px; margin: 0 auto;">
        
        <div class="btn-aba-container" style="display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; background-color: #0b0f19; padding: 10px; border-radius: 8px; border: 1px solid #1a2235;">
            <button class="btn-aba" id="aba-legendary" onclick="filtrarRaridade('legendary')" style="background: #1c2336; color: #ffa502; border: 1px solid #ffa502; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px;">👑 Legendaries</button>
            <button class="btn-aba" id="aba-epics" onclick="filtrarRaridade('epics')" style="background: transparent; color: #a55eea; border: 1px solid transparent; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px;">✨ Epics</button>
            <button class="btn-aba" id="aba-rares" onclick="filtrarRaridade('rares')" style="background: transparent; color: #45aaf2; border: 1px solid transparent; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px;">💎 Rares</button>
            <button class="btn-aba" id="aba-commons" onclick="filtrarRaridade('commons')" style="background: transparent; color: #a5b1c2; border: 1px solid transparent; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px;">📦 Commons</button>
            <button class="btn-aba" id="aba-changelog-view" onclick="filtrarRaridade('changelog')" style="background: transparent; color: #ffa502; border: 1px solid transparent; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px;">🔄 Logs / Updates</button>
        </div>

        <div id="btn-exportar-container" style="text-align: center; margin-bottom: 25px;">
            <button type="button" onclick="exportarLista()" style="background: #2ed573; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px;">Copiar Backup da Lista 📋</button>
        </div>

        <h2 id="titulo-secao" style="color: #fff; font-size: 24px; margin-left: 10px; border-left: 4px solid #ffa502; padding-left: 10px; text-transform: uppercase;">📋 LISTA DE ITENS: LEGENDARY</h2>
        
        <div id="container-cards" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 12px; padding: 5px;"></div>
        
        <div id="container-changelog" style="display: none; max-width: 600px; margin: 0 auto;"></div>
    </div>

    <script>
        // ... (Seu array BASE_PADRAO_MARRETAS continua idêntico aqui)
        const BASE_PADRAO_MARRETAS = [
            {"id":1001,"nome":"1 Billion","imgSrc":"https://i.postimg.cc/RZt4jpTP/1-Billion.webp","raridade":"legendary"},
            {"id":1090,"nome":"Gothic Bouquet","imgSrc":"https://i.postimg.cc/gJzpLzPz/Gothic-Bouquet.webp","raridade":"legendary"},
            {"id":1167,"nome":"Strawberry Jelly Basket","imgSrc":"https://i.postimg.cc/bvH8vGWB/Strawberry-Jelly-Basket.webp","raridade":"legendary"}
        ];

        let listaDeMarretas = [];
        let raridadeAtual = 'legendary'; 
        
        function inicializarBancoDados() {
            let dadosLocais = null;
            try { dadosLocais = JSON.parse(localStorage.getItem('ftf_custom_v4')); } catch (e) { dadosLocais = null; }
            if (!Array.isArray(dadosLocais) || dadosLocais.length === 0) {
                listaDeMarretas = [];
                forçarInjecaoListaPadrao();
            } else { listaDeMarretas = dadosLocais; }
            carregarCardsSalvos();
        }

        function forçarInjecaoListaPadrao() {
            listaDeMarretas = BASE_PADRAO_MARRETAS.map(m => ({
                id: m.id,
                nome: m.nome || "Marreta",
                valor: m.valor || '10',
                raridade: m.raridade || 'legendary',
                demanda: m.demanda || '5',
                tendencia: m.tendencia || 'none',
                status: m.status || 'none',
                templates: m.templates || 'Stable',
                imgSrc: m.imgSrc
            }));
            localStorage.setItem('ftf_custom_v4', JSON.stringify(listaDeMarretas));
        }

        function resetarParaPadraoCodigo() {
            localStorage.removeItem('ftf_custom_v4');
            localStorage.removeItem('ftf_changelogs');
            forçarInjecaoListaPadrao();
            document.getElementById('container-changelog').innerHTML = '';
            carregarCardsSalvos();
            alert("Memória limpa! Dados restaurados do zero! 💎");
        }

        // ALTERNADOR DINÂMICO DAS 3 ABAS DO FORMULÁRIO
        function mudarAbaForm(aba) {
            document.getElementById('tab-unico').classList.remove('active');
            document.getElementById('tab-massa').classList.remove('active');
            document.getElementById('tab-changelog').classList.remove('active');
            document.getElementById('form-individual').style.display = 'none';
            document.getElementById('form-massa').style.display = 'none';
            document.getElementById('form-changelog').style.display = 'none';

            if(aba === 'unico') {
                document.getElementById('tab-unico').classList.add('active');
                document.getElementById('form-individual').style.display = 'block';
            } else if(aba === 'massa') {
                document.getElementById('tab-massa').classList.add('active');
                document.getElementById('form-massa').style.display = 'block';
            } else {
                document.getElementById('tab-changelog').classList.add('active');
                document.getElementById('form-changelog').style.display = 'block';
            }
        }

        // CONTROLE DE EXIBIÇÃO DOS INPUTS DO CHANGELOG
        function alternarCamposLog() {
            const type = document.getElementById('logActionType').value;
            document.getElementById('logValue').style.display = (type === 'increase' || type === 'decrease' || type === 'other') ? 'block' : 'none';
            document.getElementById('logDemand').style.display = (type === 'demand') ? 'block' : 'none';
            document.getElementById('logStatus').style.display = (type === 'description') ? 'block' : 'none';
        }

        // SALVA E MONTA O CARD DO CHANGELOG IGUAL AO PRINT
        function adicionarCardChangelog() {
            const versao = document.getElementById('logVersion').value;
            const data = document.getElementById('logDate').value || 'Recent';
            const nome = document.getElementById('logItemName').value;
            const acao = document.getElementById('logActionType').value;

            if(!versao || !nome) { alert('Preencha pelo menos Versão e Nome do Item!'); return; }

            let classeTipo = '', txtBadge = '', icone = '', frase = '';

            if (acao === 'increase') {
                const val = document.getElementById('logValue').value;
                classeTipo = 'type-increase'; txtBadge = 'Value Increase'; icone = '📈'; frase = `${nome} increased to ${val} ↓`;
            } else if (acao === 'decrease') {
                const val = document.getElementById('logValue').value;
                classeTipo = 'type-decrease'; txtBadge = 'Value Decrease'; icone = '📉'; frase = `${nome} decreased to ${val} ↓`;
            } else if (acao === 'demand') {
                const dem = document.getElementById('logDemand').value;
                classeTipo = 'type-demand'; txtBadge = 'Demand Change'; icone = '⚡'; frase = `${nome} demand updated to ${dem}`;
            } else if (acao === 'description') {
                const st = document.getElementById('logStatus').value;
                classeTipo = 'type-description'; txtBadge = 'Description Change'; icone = '📄'; frase = `${nome} set to ${st}`;
            } else if (acao === 'bugfix') {
                classeTipo = 'type-other'; txtBadge = 'Bug Fix'; icone = '🛠️'; frase = `${nome} fixed`;
            } else if (acao === 'other') {
                const val = document.getElementById('logValue').value;
                classeTipo = 'type-other'; txtBadge = 'Other / Correction'; icone = '📝'; frase = `${nome} corrected to ${val} *`;
            }

            let logsSalvos = JSON.parse(localStorage.getItem('ftf_changelogs')) || [];
            logsSalvos.push({ versao, data, classeTipo, txtBadge, icone, frase, id: Date.now() });
            localStorage.setItem('ftf_changelogs', JSON.stringify(logsSalvos));

            document.getElementById('logItemName').value = '';
            document.getElementById('logValue').value = '';
            
            if(raridadeAtual === 'changelog') renderizarAbaChangelogCompleta();
            alert('Log inserido com sucesso!');
        }

        function renderizarAbaChangelogCompleta() {
            const container = document.getElementById('container-changelog');
            container.innerHTML = '';
            let logsSalvos = JSON.parse(localStorage.getItem('ftf_changelogs')) || [];
            
            // Agrupa logs por versão
            let versoesAgrupadas = {};
            logsSalvos.forEach(log => {
                if(!versoesAgrupadas[log.versao]) {
                    versoesAgrupadas[log.versao] = { data: log.data, itens: [] };
                }
                versoesAgrupadas[log.versao].itens.push(log);
            });

            Object.keys(versoesAgrupadas).reverse().forEach(v => {
                const card = document.createElement('div');
                card.className = 'changelog-card';
                let htmlInterno = `
                    <div class="changelog-header">
                        <h2>${v}</h2>
                        <span class="changelog-date">${versoesAgrupadas[v].data}</span>
                    </div>
                    <div class="changelog-list">`;
                
                versoesAgrupadas[v].itens.forEach(item => {
                    htmlInterno += `
                        <div class="log-row ${item.classeTipo}">
                            <div class="log-icon-box">${item.icone}</div>
                            <div class="log-content">
                                <span class="log-title">${item.txtBadge}</span>
                                <p class="log-text">${item.frase}</p>
                            </div>
                        </div>`;
                });
                card.innerHTML = htmlInterno + `</div>`;
                container.appendChild(card);
            });
        }

        function filtrarRaridade(raridadeAlvo) {
            raridadeAtual = raridadeAlvo;
            definirAbaAtivaVisual(raridadeAlvo);
            
            if(raridadeAlvo === 'changelog') {
                document.getElementById('container-cards').style.display = 'none';
                document.getElementById('container-changelog').style.display = 'block';
                renderizarAbaChangelogCompleta();
            } else {
                document.getElementById('container-cards').style.display = 'grid';
                document.getElementById('container-changelog').style.display = 'none';
                carregarCardsSalvos();
            }
        }

        function definirAbaAtivaVisual(raridadeAlvo) {
            const botoes = document.querySelectorAll('.btn-aba');
            botoes.forEach(btn => { btn.style.background = 'transparent'; btn.style.borderColor = 'transparent'; });
            
            const seletorId = raridadeAlvo === 'changelog' ? 'aba-changelog-view' : 'aba-' + raridadeAlvo;
            const botaoAtivo = document.getElementById(seletorId);
            if (botaoAtivo) {
                botaoAtivo.style.background = '#1c2336';
                botaoAtivo.style.borderColor = '#ffa502';
            }
            document.getElementById('titulo-secao').innerText = `📋 LISTA DE ITENS: ${raridadeAlvo.toUpperCase()}`;
        }

        function carregarCardsSalvos() {
            const container = document.getElementById('container-cards');
            if (!container || raridadeAtual === 'changelog') return;

            const barra = document.getElementById('barraPesquisa');
            const termoPesquisa = barra ? barra.value.toLowerCase() : "";

            const itensFiltrados = listaDeMarretas.filter(item => {
                const raridadeItem = (item.raridade || 'legendary').toLowerCase();
                const bateRaridade = raridadeItem === raridadeAtual.toLowerCase();
                const bateNome = (item.nome || "").toLowerCase().includes(termoPesquisa);
                return bateRaridade && bateNome;
            });

            container.innerHTML = '';
            const fragment = document.createDocumentFragment();
            itensFiltrados.forEach(item => {
                const card = renderizarCardHTML(item); 
                if (card) fragment.appendChild(card);
            });
            container.appendChild(fragment);
            atualizarNumbersVisuais();
        }

        // ... (As demais funções importarLinksEmMassa, criarNovoCard, renderizarCardHTML continuam aqui embaixo exatamente como no seu arquivo)
        function importarLinksEmMassa() {
            const campoTexto = document.getElementById('listaLinksMassa').value;
            if(!campoTexto.trim()) return;
            const regexLinks = /(https?:\/\/[^\s]+)/g;
            const linksEncontrados = campoTexto.match(regexLinks);
            if(!linksEncontrados) { alert('Nenhum link extra válido detectado.'); return; }

            linksEncontrados.forEach((url, i) => {
                listaDeMarretas.push({ 
                    id: Date.now() + i + Math.floor(Math.random() * 9000), nome: `Item Extra ${listaDeMarretas.length + 1}`, 
                    valor: '10', raridade: raridadeAtual, demanda: '5', tendencia: 'none', status: 'none', templates: 'Stable', imgSrc: url.trim() 
                });
            });
            localStorage.setItem('ftf_custom_v4', JSON.stringify(listaDeMarretas));
            carregarCardsSalvos();
            document.getElementById('listaLinksMassa').value = '';
            alert('Links extras adicionados!');
        }

        function togglePrintMode() {
            document.body.classList.toggle('hide-mode');
            const btn = document.getElementById('togglePrintBtn');
            if (document.body.classList.contains('hide-mode')) {
                btn.innerText = "Modo Edição"; btn.style.background = "#ffa502"; btn.style.color = "#000";
            } else {
                btn.innerText = "Modo Print"; btn.style.background = "#1c2336"; btn.style.color = "#ffa502";
            }
        }

        function criarNovoCard() {
            const nome = document.getElementById('nomeItem').value;
            const urlImagem = document.getElementById('linkImagem').value || 'https://via.placeholder.com/150';
            let valor = document.getElementById('valorItem').value || '10';
            const raridade = document.getElementById('raridadeItem').value;
            const demanda = document.getElementById('demandaNota').value || '5';
            const tendencia = document.getElementById('tendenciaValor').value;
            const status = document.getElementById('statusItem').value;
            const estabilidade = document.getElementById('estabilidadeItem').value || 'Stable';

            if (!nome) { alert('Por favor, dê um nome!'); return; }

            listaDeMarretas.push({ 
                id: Date.now(), nome: nome, valor: valor.toString().trim(), raridade: raridade || 'legendary', 
                demanda: demanda, tendencia: tendencia, status: status, templates: estabilidade, imgSrc: urlImagem 
            });
            
            localStorage.setItem('ftf_custom_v4', JSON.stringify(listaDeMarretas));
            raridadeAtual = raridade;
            filtrarRaridade(raridade);

            document.getElementById('nomeItem').value = '';
            document.getElementById('linkImagem').value = '';
            document.getElementById('valorItem').value = '';
        }

        function renderizarCardHTML(item) {
            const container = document.getElementById('container-cards');
            const card = document.createElement("div");

            card.style.backgroundColor = '#0b0f19';
            card.style.border = `1.5px solid #ffa502`; 
            card.style.borderRadius = '12px'; card.style.padding = '12px'; card.style.width = '100%'; 
            card.style.color = '#fff'; card.style.position = 'relative'; card.style.boxSizing = 'border-box';
            card.style.display = 'flex'; card.style.flexDirection = 'column';
            card.setAttribute('data-id', item.id);

            card.innerHTML = `
                <button class="btn-deletar" style="position: absolute; top: 8px; right: 8px; background: transparent; border: none; color: #62697e; font-weight: bold; cursor: pointer; font-size: 12px; z-index: 5;">❌</button>
                <div style="background-color: transparent; width: 100%; height: 110px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px;">
                    <img src="${item.imgSrc}" alt="${item.nome}" loading="lazy" style="max-width: 100%; max-height: 100%; object-fit: contain;" onerror="this.src='https://placehold.co/150x110/0b0f19/ffffff?text=Sem+Foto'">
                </div>
                <span class="txt-posicao-automatica" style="position: absolute; top: 12px; left: 12px; background: #ffa502; color: #000; font-size: 10px; font-weight: bold; padding: 2px 5px; border-radius: 4px;">#--</span>
                <h3 style="margin: 0 0 2px 0; color: #ffffff; font-size: 14px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${item.nome}</h3>
                <span style="color: #62697e; font-size: 9px; font-weight: bold; text-transform: uppercase;">${item.raridade || 'legendary'}</span>
                <div style="margin-top: 10px; font-size: 11px; display: flex; flex-direction: column; gap: 6px;">
                    <div>
                        <div style="color: #4b5266; font-size: 8px; font-weight: bold; text-transform: uppercase;">VALUE</div>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span class="box-valor-dinamico" style="font-size: 16px; font-weight: bold;"></span>
                            <span class="txt-estabilidade" style="background: #161c2e; color: #8fa0c4; font-size: 9px; font-weight: bold; padding: 2px 6px; border-radius: 4px; border: 1px solid #232f4b;">${item.templates || 'Stable'}</span>
                        </div>
                    </div>
                    <div class="box-badge-status" style="display: flex; justify-content: flex-end; margin-top: -2px;"></div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 2px; border-top: 1px solid #161c2e; padding-top: 8px;">
                        <span style="color: #4b5266; font-size: 8px; font-weight: bold;">DEMAND</span>
                        <span class="txt-demanda-estrelas" style="font-size: 11px;"></span>
                    </div>
                </div>
                <div class="btn-acoes-card" style="margin-top: 12px; display: flex; flex-direction: column; gap: 4px; border-top: 1px solid #161c2e; padding-top: 8px;">
                    <div style="display: flex; gap: 4px;">
                        <button class="btn-subir" style="flex: 1; background: #121826; color: #fff; border: 1px solid #232f4b; padding: 4px; cursor: pointer; border-radius: 4px; font-size: 10px;">▲ Subir</button>
                        <button class="btn-descer" style="flex: 1; background: #121826; color: #fff; border: 1px solid #232f4b; padding: 4px; cursor: pointer; border-radius: 4px; font-size: 10px;">▼ Descer</button>
                    </div>
                    <button class="btn-editar" style="background: #1c2336; color: #ffa502; border: 1px solid #2d3854; padding: 4px; cursor: pointer; border-radius: 4px; font-size: 10px; font-weight: bold;">✏️ Editar</button>
                </div>
            `;

            card.querySelector('.btn-editar').addEventListener('click', function() {
                const nN = prompt("Mudar nome:", item.nome); const nV = prompt("Novo Valor:", item.valor);
                if (nN) item.nome = nN.trim(); if (nV) item.valor = nV.trim();
                localStorage.setItem('ftf_custom_v4', JSON.stringify(listaDeMarretas)); carregarCardsSalvos();
            });

            card.querySelector('.btn-deletar').addEventListener('click', function() {
                if (confirm(`Excluir marreta "${item.nome}"?`)) {
                    listaDeMarretas = listaDeMarretas.filter(m => m.id !== item.id); card.remove();
                    localStorage.setItem('ftf_custom_v4', JSON.stringify(listaDeMarretas)); atualizarNumbersVisuais();
                }
            });

            card.querySelector('.btn-subir').addEventListener('click', function() {
                const ant = card.previousElementSibling; if (ant) { container.insertBefore(card, ant); reordenarArrayEGuardar(); }
            });
            card.querySelector('.btn-descer').addEventListener('click', function() {
                const prox = card.nextElementSibling; if (prox) { container.insertBefore(prox, card); reordenarArrayEGuardar(); }
            });

            atualizarEstiloValorDoCard(card, item);
            gerarEstrelasDemanda(card, item.demanda);
            return card;
        }

        function ordenarEAtualizar() {
            const criterio = document.getElementById('ordenacaoLista').value;
            if (criterio === 'nome-az') listaDeMarretas.sort((a, b) => (a.nome || "").localeCompare(b.nome || ""));
            else if (criterio === 'nome-za') listaDeMarretas.sort((a, b) => (b.nome || "").localeCompare(a.nome || ""));
            else if (criterio === 'valor-alto') listaDeMarretas.sort((a, b) => parseFloat(b.valor) - parseFloat(a.valor));
            else if (criterio === 'valor-baixo') listaDeMarretas.sort((a, b) => parseFloat(a.valor) - parseFloat(b.valor));
            carregarCardsSalvos();
        }

        function reordenarArrayEGuardar() {
            let listaLimpa = listaDeMarretas.filter(item => (item.raridade || 'legendary') !== raridadeAtual);
            let reordenados = [];
            document.querySelectorAll('#container-cards > div').forEach((cardHTML) => {
                const id = parseInt(cardHTML.getAttribute('data-id'));
                const comp = listaDeMarretas.find(m => m.id === id);
                if (comp) reordenados.push(comp);
            });
            listaDeMarretas = [...listaLimpa, ...reordenados];
            localStorage.setItem('ftf_custom_v4', JSON.stringify(listaDeMarretas));
            atualizarNumbersVisuais();
        }

        function atualizarNumbersVisuais() {
            document.querySelectorAll('#container-cards > div').forEach((cardHTML, index) => {
                const cx = cardHTML.querySelector('.txt-posicao-automatica'); if (cx) cx.innerText = `#${index + 1}`;
            });
        }

        function atualizarEstiloValorDoCard(cardHTML, item) {
            const containerValor = cardHTML.querySelector('.box-valor-dinamico');
            const containerBadge = cardHTML.querySelector('.box-badge-status');
            if (!containerValor) return;

            let badgeTendencia = '';
            if (item.tendencia === 'subiu') { badgeTendencia = ` <span style="color: #2ed573;">↑</span>`; }
            else if (item.tendencia === 'caiu') { badgeTendencia = ` <span style="color: #ff4757;">↓</span>`; }
            else if (item.tendencia === 'corrigido') { badgeTendencia = ` <span style="color: #ffa502;">*</span>`; }
            
            containerValor.style.color = '#ffa502'; containerValor.innerHTML = `${item.valor || '10'}${badgeTendencia}`;

            if (containerBadge) {
                containerBadge.innerHTML = '';
                if (item.status === 'overpaid') containerBadge.innerHTML = `<span style="color: #2ed573; font-size: 8px; font-weight: bold; background: rgba(46, 213, 115, 0.1); padding: 1px 4px; border-radius: 4px; border: 1px solid rgba(46, 213, 115, 0.3);">+ Overpaid</span>`;
                else if (item.status === 'underpaid') containerBadge.innerHTML = `<span style="color: #ff9f43; font-size: 8px; font-weight: bold; background: rgba(255, 159, 67, 0.1); padding: 1px 4px; border-radius: 4px; border: 1px solid rgba(255, 159, 67, 0.3);">- Underpaid</span>`;
                else if (item.status === 'niche') containerBadge.innerHTML = `<span style="color: #a55eea; font-size: 8px; font-weight: bold; background: rgba(165, 94, 234, 0.1); padding: 1px 4px; border-radius: 4px; border: 1px solid rgba(165, 94, 234, 0.3);">💎 Niche</span>`;
            }
        }

        function gerarEstrelasDemanda(cardHTML, notaEstrelas) {
            const containerEstrelas = cardHTML.querySelector('.txt-demanda-estrelas'); if (!containerEstrelas) return;
            let notaNum = parseFloat(notaEstrelas) || 0; let estrelasHTML = '';
            const estiloEstrela = `font-size: 16px; display: inline-block; position: relative; font-family: sans-serif; line-height: 1; vertical-align: middle;`;

            for (let i = 1; i <= 5; i++) {
                if (notaNum >= i) { estrelasHTML += `<span style="${estiloEstrela} color: #ffb830;">★</span>`; }
                else if (notaNum > i - 1 && notaNum < i) {
                    estrelasHTML += `<span style="${estiloEstrela} color: #323b54;">★<span style="position: absolute; top: 0; left: 0; width: 50%; overflow: hidden; color: #ffb830;">★</span></span>`;
                } else { estrelasHTML += `<span style="${estiloEstrela} color: #323b54;">☆</span>`; }
            }
            containerEstrelas.innerHTML = estrelasHTML;
        }

        function exportarLista() {
            navigator.clipboard.writeText(JSON.stringify(listaDeMarretas, null, 2)).then(() => { alert("Backup copiado! 📋"); });
        }

        window.onload = inicializarBancoDados;
    </script>
</body>
</html>
