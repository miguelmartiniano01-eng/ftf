<html lang="pt-BR">

    <title>FTF Values - Custom Edition</title>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="application-name" content="FTF Values">
    <meta name="apple-mobile-web-app-title" content="FTF Values">
    <meta name="theme-color" content="#0f1117">
    <meta name="msapplication-navbutton-color" content="#0f1117">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="apple-touch-icon" href="https://via.placeholder.com/192">

    <style>
        /* Base & Colors Reset */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0f1117;
            color: #ffffff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 12px;
            -webkit-font-smoothing: antialiased;
        }

        /* Top Header Navigation style FTF */
        .ftf-header {
            max-width: 1300px;
            margin: 0 auto 12px auto;
            background: #161920;
            border-bottom: 1px solid #232836;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 6px;
        }

        .ftf-header-logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ftf-header-logo h1 {
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #ffffff;
        }

        .ftf-header-logo span {
            color: #ffb830;
        }

        .ftf-nav-links {
            display: flex;
            gap: 16px;
        }

        .ftf-nav-item {
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            cursor: pointer;
            transition: color 0.2s;
            text-transform: uppercase;
        }

        .ftf-nav-item.active {
            color: #ffb830;
        }

        /* Controls Toggle Area */
        .toolbar-container {
            max-width: 1300px;
            margin: 0 auto 12px auto;
            background: #161920;
            padding: 8px 12px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            border: 1px solid #1e222b;
        }

        .ui-btn {
            background: #222733;
            color: #cbd5e1;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid #2d3445;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ui-btn:hover {
            background: #2d3445;
            color: #fff;
        }

        .btn-salvar-galeria {
            background: #ffb830;
            color: #000;
            border: none;
        }

        .btn-salvar-galeria:hover {
            background: #e6a422;
            color: #000;
        }

        /* Dashboard Overview Area style FTF */
        .ftf-dashboard {
            max-width: 1300px;
            margin: 0 auto 12px auto;
            background: #161920;
            border-radius: 6px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border: 1px solid #1e222b;
        }

        .ftf-dash-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .ftf-dash-block {
            display: flex;
            flex-direction: column;
        }

        .ftf-dash-label {
            font-size: 10px;
            color: #64748b;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .ftf-dash-value {
            font-size: 18px;
            font-weight: 800;
            color: #ffffff;
        }

        .ftf-dash-value span {
            color: #ffb830;
        }

        .dash-date-input {
            background: #0f1117;
            color: #94a3b8;
            border: 1px solid #232836;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            outline: none;
            width: 120px;
            text-align: center;
            font-weight: 600;
        }

        /* Main Search & Sorting Inputs Row */
        .search-wrapper {
            max-width: 1300px;
            margin: 0 auto 12px auto;
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .input-style {
            background: #161920;
            color: #fff;
            border: 1px solid #232836;
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-style:focus {
            border-color: #ffb830;
        }

        #barraPesquisa {
            flex: 1;
        }

        #ordenacaoLista {
            width: 200px;
            font-weight: 600;
            cursor: pointer;
            color: #94a3b8;
        }

        /* Filter Tab Buttons Style */
        .btn-aba-container, .event-filter-wrapper, .subtabs-container, .event-symbols-container {
            max-width: 1300px;
            margin: 0 auto 8px auto;
            background: #161920;
            padding: 6px;
            border-radius: 6px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-items: center;
            border: 1px solid #1e222b;
        }

        /* Grid de Símbolos de Evento Dinâmicos */
        .event-symbols-container {
            justify-content: center;
            gap: 10px;
            padding: 8px;
        }

        .event-symbol-btn {
            background: #222733;
            border: 1px solid #2d3445;
            border-radius: 6px;
            padding: 4px 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            height: 40px;
        }

        .event-symbol-btn img {
            height: 28px;
            object-fit: contain;
        }

        .event-symbol-btn:hover {
            background: #2d3445;
            border-color: #ffb830;
        }

        .event-symbol-btn.active {
            background: #ffb830;
            border-color: #ffb830;
        }

        .btn-aba, .btn-subtab {
            background: transparent;
            color: #94a3b8;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.15s;
        }

        .btn-aba:hover, .btn-subtab:hover {
            color: #fff;
            background: #202633;
        }

        .btn-aba.active, .btn-subtab.active {
            background: #ffb830;
            color: #000 !important;
            font-weight: 700;
        }

        .event-filter-wrapper label {
            font-size: 11px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            padding-left: 6px;
        }

        .select-event {
            background: #0f1117;
            color: #fff;
            border: 1px solid #232836;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            outline: none;
            cursor: pointer;
        }

        /* Item Creator Layout Panel Form */
        #criador-form {
            background-color: #161920;
            padding: 14px;
            border-radius: 6px;
            border: 1px solid #232836;
            max-width: 1300px;
            margin: 0 auto 12px auto;
        }

        .form-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 12px;
            border-bottom: 1px solid #232836;
            padding-bottom: 6px;
        }

        .form-tab-btn {
            background: transparent;
            color: #94a3b8;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            border-radius: 4px;
        }

        .form-tab-btn.active {
            background: #222733;
            color: #ffb830;
        }

        .form-section h3 {
            color: #fff;
            font-size: 14px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 8px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-label {
            color: #64748b;
            font-size: 11px;
            margin-bottom: 4px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .form-input-full {
            width: 100%;
        }

        .btn-submit {
            grid-column: 1 / -1;
            padding: 10px;
            background: #ffb830;
            color: black;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
            margin-top: 6px;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background: #e6a422;
        }

        /* Section Category Title Header Layout */
        #titulo-secao {
            max-width: 1300px;
            margin: 16px auto 10px auto;
            color: #fff;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #titulo-secao::before {
            content: '';
            display: inline-block;
            width: 3px;
            height: 14px;
            background: #ffb830;
            border-radius: 2px;
        }

        /* Strict FTF Cards Container System Grid */
        #container-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 8px;
            max-width: 1300px;
            margin: 0 auto;
            width: 100%;
        }

        /* Strict Official FTF Card UI Style Concept */
        .ftf-item-card {
            background-color: #14171f;
            border: 1px solid #1f2430;
            border-radius: 5px;
            padding: 5px;
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            transition: transform 0.15s;
            overflow: hidden;
        }

        /* 60% Card Height Image Container Slot */
        .ftf-card-img-wrapper {
            height: 120px;
            background: #0f1117;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid #1a1e26;
            margin-bottom: 5px;
            position: relative;
        }

        .ftf-card-img-wrapper img {
            width: 100%;
            height: 100%;
            max-width: 100px;
            max-height: 100px;
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }

        .txt-posicao-automatica {
            position: absolute;
            top: 4px;
            left: 4px;
            background: rgba(15, 17, 23, 0.85);
            color: #64748b;
            font-weight: 800;
            border-radius: 3px;
            font-size: 9px;
            padding: 1px 4px;
            border: 1px solid #232836;
            z-index: 2;
        }

        .ftf-card-info {
            display: flex;
            flex-direction: column;
            text-align: left;
            padding: 1px 2px;
        }

        .ftf-item-name {
            margin: 0;
            font-size: 11.5px;
            font-weight: 700;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.2;
        }

        .ftf-item-rarity {
            font-size: 8px;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 1px;
            margin-bottom: 4px;
            letter-spacing: 0.3px;
        }

        /* Core Values Layout Elements Split */
        .ftf-value-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 4px;
        }

        .ftf-value-label {
            font-size: 7px;
            color: #475569;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .box-valor-dinamico {
            font-size: 16px;
            font-weight: 900;
            color: #ffb830;
            line-height: 1;
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .txt-estabilidade {
            display: flex;
            align-items: center;
            gap: 3px;
            padding: 2px 4px;
            border-radius: 3px;
            font-size: 8px;
            font-weight: 700;
            background: #161a24;
            border: 1px solid #222938;
            height: 16px;
        }

        .txt-estabilidade svg {
            width: 10px;
            height: 10px;
            flex: none;
        }

        /* Status & Demand Rows */
        .box-badge-status {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 4px;
            min-height: 12px;
        }

        .ftf-badge {
            font-size: 7px;
            font-weight: 800;
            padding: 1px 4px;
            border-radius: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .ftf-demand-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #1a1e26;
            padding-top: 4px;
            margin-top: 2px;
        }

        .txt-demanda-estrelas {
            display: flex;
            gap: 0.5px;
            align-items: center;
        }

        /* Action Configuration Controls Layer */
        .btn-acoes-card {
            margin-top: 5px;
            display: flex;
            flex-direction: column;
            gap: 3px;
            border-top: 1px dashed #232836;
            padding-top: 4px;
        }

        .btn-acoes-card-row {
            display: flex;
            gap: 3px;
        }

        .btn-acoes-card button {
            background: #1c202b;
            color: #94a3b8;
            border: 1px solid #282f40;
            font-size: 9px;
            padding: 3px;
            border-radius: 3px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-acoes-card button:hover {
            background: #282f40;
            color: #fff;
        }

        .btn-deletar {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(15,17,23,0.8);
            border: 1px solid #232836;
            color: #ef4444;
            font-size: 8px;
            width: 14px;
            height: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 3px;
            cursor: pointer;
            z-index: 10;
        }

        /* High Compact Print Mode (Forced 16 Col Grid View) */
        .hide-mode .ftf-header,
        .hide-mode #criador-form,
        .hide-mode .btn-aba-container,
        .hide-mode #btn-exportar-container,
        .hide-mode #search-container,
        .hide-mode .btn-deletar,
        .hide-mode .btn-acoes-card,
        .hide-mode #btn-limpar-tudo,
        .hide-mode .subtabs-container,
        .hide-mode .event-filter-wrapper,
        .hide-mode .event-symbols-container,
        .hide-mode .toolbar-container { display: none !important; }

        .hide-mode #container-cards {
            grid-template-columns: repeat(16, 1fr) !important;
            width: 100% !important;
            max-width: 100% !important;
            gap: 4px !important;
        }

        .hide-mode .ftf-item-card {
            padding: 3px !important;
        }

        .hide-mode .ftf-card-img-wrapper {
            height: 75px !important;
        }

        .hide-mode .ftf-item-name {
            font-size: 9px !important;
        }

        .hide-mode .box-valor-dinamico {
            font-size: 12px !important;
        }

        .hide-mode .txt-estabilidade {
            font-size: 6.5px !important;
            padding: 1px 2px !important;
            height: 12px !important;
        }

        .ocultar-controles-cards .btn-acoes-card,
        .ocultar-controles-cards .btn-deletar {
            display: none !important;
        }

        /* Utilities */
        hr {
            display: none;
        }

        #btn-exportar-container {
            max-width: 1300px;
            margin: 0 auto 12px auto;
            text-align: right;
        }

        /* Mobile Optimization Rules */
        @media (max-width: 640px) {
            #container-cards {
                grid-template-columns: repeat(3, 1fr);
                gap: 4px;
            }
            .ftf-header-logo h1 { font-size: 14px; }
            .ftf-nav-links { gap: 8px; }
            .ftf-nav-item { font-size: 11px; }
            .ftf-card-img-wrapper { height: 95px; }
        }
    </style>
</head>

        let itens = JSON.parse(localStorage.getItem('ftf_items')) || [];
        let categoriaAtual = 'todos';
        let eventoAtual = 'todos';

        // Inicialização do Sistema
        window.addEventListener('DOMContentLoaded', () => {
            const dataSalva = localStorage.getItem('ftf_data_atualizacao');
            if (dataSalva) document.getElementById('dash-data').value = dataSalva;
            
            // Se o banco local estiver vazio, injeta automaticamente as marretas padrão fornecidas
            if (itens.length === 0) {
                carregarMarretasPadrao();
            }
            
            filtrarEExibirItens();
        });

        // Transforma a lista de links brutos em objetos estruturados no sistema
        function carregarMarretasPadrao() {
            linksMarretasPadrao.forEach((link, idx) => {
                // Extrai o nome do arquivo limpando a extensão e substituindo hifens/traços por espaços simples
                let nomeTratado = link.split('/').pop().split('.')[0].replace(/[-_]/g, ' ');
                
                // Tenta categorizar de forma simples alguns tipos clássicos de eventos com base no nome
                let cat = "marretas";
                let tEvento = "";
                let nomeLower = nomeTratado.toLowerCase();
                
                if (nomeLower.includes("halloween") || nomeLower.includes("spook") || nomeLower.includes("witch") || nomeLower.includes("coffin") || nomeLower.includes("zombie")) {
                    cat = "evento";
                    tEvento = "halloween";
                } else if (nomeLower.includes("santa") || nomeLower.includes("winter") || nomeLower.includes("christmas") || nomeLower.includes("jingle") || nomeLower.includes("natal") || nomeLower.includes("snow") || nomeLower.includes("tree")) {
                    cat = "evento";
                    tEvento = "natal";
                } else if (nomeLower.includes("anniversary") || nomeLower.includes("niver")) {
                    cat = "evento";
                    tEvento = "aniversario";
                } else if (nomeLower.includes("easter") || nomeLower.includes("bunny") || nomeLower.includes("pascoa")) {
                    cat = "evento";
                    tEvento = "pascoa";
                }

                itens.push({
                    id: Date.now() + idx, // Evita IDs colididos na iteração
                    nome: nomeTratado,
                    imagem: link,
                    categoria: cat,
                    tipoEvento: tEvento,
                    raridade: "Lendário",
                    corRaridade: "#ffb830",
                    valor: 1000, // Valor padrão de entrada para edição posterior
                    estabilidade: "estavel",
                    demanda: 3,
                    status: ""
                });
            });
            salvarDados();
        }

        function salvarDados() {
            localStorage.setItem('ftf_items', JSON.stringify(itens));
            localStorage.setItem('ftf_data_atualizacao', document.getElementById('dash-data').value);
            document.getElementById('dash-total-itens').innerText = itens.length;
        }

        function ajustarFormEvento(cat) {
            const grupoEvento = document.getElementById('form-group-evento');
            grupoEvento.style.display = (cat === 'evento') ? 'flex' : 'none';
        }

        function alternarFormulario() {
            const form = document.getElementById('criador-form');
            form.style.display = (form.style.display === 'none') ? 'block' : 'none';
        }

        function mudarCategoria(btn) {
            document.querySelectorAll('.btn-aba').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            categoriaAtual = btn.getAttribute('data-categoria');
            
            const areaEventos = document.getElementById('event-symbols');
            if (categoriaAtual === 'evento') {
                areaEventos.style.display = 'flex';
            } else {
                areaEventos.style.display = 'none';
                eventoAtual = 'todos';
            }
            
            document.getElementById('titulo-secao').innerText = btn.innerText;
            filtrarEExibirItens();
        }

        function filtrarPorEvento(btn) {
            document.querySelectorAll('.event-symbol-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            eventoAtual = btn.getAttribute('data-evento');
            filtrarEExibirItens();
        }

        function adicionarItem(e) {
            e.preventDefault();
            
            const novoItem = {
                id: Date.now(),
                nome: document.getElementById('nome').value,
                imagem: document.getElementById('imagem').value,
                categoria: document.getElementById('categoria').value,
                tipoEvento: document.getElementById('categoria').value === 'evento' ? document.getElementById('tipoEvento').value : '',
                raridade: document.getElementById('raridade').value,
                corRaridade: document.getElementById('corRaridade').value,
                valor: parseFloat(document.getElementById('valor').value) || 0,
                estabilidade: document.getElementById('estabilidade').value,
                demanda: parseInt(document.getElementById('demanda').value),
                status: document.getElementById('status').value
            };

            itens.push(novoItem);
            salvarDados();
            filtrarEExibirItens();
            document.getElementById('form-item').reset();
            ajustarFormEvento('armas');
        }

        function deletarItem(id) {
            itens = itens.filter(item => item.id !== id);
            salvarDados();
            filtrarEExibirItens();
        }

        function alterarValorManual(id, acrescimo) {
            const idx = itens.findIndex(i => i.id === id);
            if (idx !== -1) {
                itens[idx].valor = Math.max(0, itens[idx].valor + acrescimo);
                salvarDados();
                filtrarEExibirItens();
            }
        }

        function filtrarEExibirItens() {
            const busca = document.getElementById('barraPesquisa').value.toLowerCase();
            const ordenacao = document.getElementById('ordenacaoLista').value;

            let filtrados = itens.filter(item => {
                const bateNome = item.nome.toLowerCase().includes(busca);
                const bateCategoria = (categoriaAtual === 'todos' || item.categoria === categoriaAtual);
                const bateEvento = (categoriaAtual !== 'evento' || eventoAtual === 'todos' || item.tipoEvento === eventoAtual);
                return bateNome && bateCategoria && bateEvento;
            });

            // Ordenação
            if (ordenacao === 'nome-asc') {
                filtrados.sort((a, b) => a.nome.localeCompare(b.nome));
            } else if (ordenacao === 'valor-desc') {
                filtrados.sort((a, b) => b.valor - a.valor);
            } else if (ordenacao === 'valor-asc') {
                filtrados.sort((a, b) => a.valor - b.valor);
            } else {
                filtrados.sort((a, b) => b.id - a.id); // Recentes
            }

            renderizarCards(filtrados);
            document.getElementById('dash-total-itens').innerText = itens.length;
        }

        function renderizarCards(lista) {
            const container = document.getElementById('container-cards');
            container.innerHTML = '';

            lista.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'ftf-item-card';

                let iconEstabilidade = '';
                if(item.estabilidade === 'subindo') iconEstabilidade = `<span style="color:#22c55e">📈</span>`;
                else if(item.estabilidade === 'descendo') iconEstabilidade = `<span style="color:#ef4444">📉</span>`;
                else if(item.estabilidade === 'instavel') iconEstabilidade = `<span style="color:#eab308">⚠️</span>`;
                else iconEstabilidade = `<span style="color:#94a3b8">⚖️</span>`;

                let badgeHTML = '';
                if(item.status === 'novo') badgeHTML = `<span class="ftf-badge" style="background:#22c55e; color:#000;">NOVO</span>`;
                else if(item.status === 'raro') badgeHTML = `<span class="ftf-badge" style="background:#a855f7; color:#fff;">RARO</span>`;
                else if(item.status === 'esgotado') badgeHTML = `<span class="ftf-badge" style="background:#ef4444; color:#fff;">OFF</span>`;

                let estrelas = '⭐'.repeat(item.demanda);

                card.innerHTML = `
                    <button class="btn-deletar" onclick="deletarItem(${item.id})">✕</button>
                    <div class="ftf-card-img-wrapper">
                        <span class="txt-posicao-automatica">#${index + 1}</span>
                        <img src="${item.imagem}" alt="${item.nome}" onerror="this.src='https://via.placeholder.com/100?text=FTF'">
                    </div>
                    <div class="ftf-card-info">
                        <h4 class="ftf-item-name">${item.nome}</h4>
                        <span class="ftf-item-rarity" style="color: ${item.corRaridade}">${item.raridade}</span>
                        
                        <div class="box-badge-status">${badgeHTML}</div>

                        <div class="ftf-value-row">
                            <div>
                                <span class="ftf-value-label">Value</span>
                                <div class="box-valor-dinamico">${item.valor.toLocaleString()}</div>
                            </div>
                            <div class="txt-estabilidade">
                                ${iconEstabilidade}
                            </div>
                        </div>

                        <div class="ftf-demand-row">
                            <span class="ftf-value-label">Demanda</span>
                            <div class="txt-demanda-estrelas" style="font-size: 8px;">${estrelas}</div>
                        </div>

                        <div class="btn-acoes-card">
                            <div class="btn-acoes-card-row">
                                <button onclick="alterarValorManual(${item.id}, 500)" style="flex:1">+500</button>
                                <button onclick="alterarValorManual(${item.id}, -500)" style="flex:1">-500</button>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function alternarModoImpressao() {
            document.body.classList.toggle('hide-mode');
        }

        function alternarBotoesCards() {
            document.body.classList.toggle('ocultar-controles-cards');
        }

        function limparTodosItens() {
            if(confirm("Tem certeza que deseja apagar TODOS os cards salvos?")) {
                itens = [];
                salvarDados();
                filtrarEExibirItens();
            }
        }

        function exportarComoImagem() {
            const jaCompacto = document.body.classList.contains('hide-mode');
            const jaSemBotoes = document.body.classList.contains('ocultar-controles-cards');
            
            if(!jaCompacto) document.body.classList.add('hide-mode');
            if(!jaSemBotoes) document.body.classList.add('ocultar-controles-cards');

            setTimeout(() => {
                html2canvas(document.body, {
                    backgroundColor: "#0f1117",
                    useCORS: true,
                    scale: 2
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `ftf-values-${Date.now()}.png`;
                    link.href = canvas.toDataURL();
                    link.click();

                    if(!jaCompacto) document.body.classList.remove('hide-mode');
                    if(!jaSemBotoes) document.body.classList.remove('ocultar-controles-cards');
                });
            }, 500);
        }
    </script>

            <button class="ui-btn" id="btn-limpar-tudo" onclick="limparTodosItens()" style="color: #ef4444; border-color: #551a1a;">Limpar Tudo</button>

    </div>

    <div class="search-wrapper" id="search-container">
        <input type="text" id="barraPesquisa" class="input-style" placeholder="Pesquisar item por nome..." oninput="filtrarEExibirItens()">
        <select id="ordenacaoLista" class="input-style" onchange="filtrarEExibirItens()">
            <option value="recente">Mais Recentes</option>

    <div class="btn-aba-container">
        <button class="btn-aba active" data-categoria="todos" onclick="mudarCategoria(this)">Todos</button>
        <button class="btn-aba" data-categoria="armas" onclick="mudarCategoria(this)">Armas</button>
        <button class="btn-aba" data-categoria="marretas" onclick="mudarCategoria(this)">Marretas</button>
        <button class="btn-aba" data-categoria="sets" onclick="mudarCategoria(this)">Sets</button>
        <button class="btn-aba" data-categoria="evento" onclick="mudarCategoria(this)">Eventos</button>

        <button class="event-symbol-btn active" data-evento="todos" onclick="filtrarPorEvento(this)">Todos Eventos</button>

        <button class="event-symbol-btn" data-evento="natal" onclick="filtrarPorEvento(this)">🎄 Natal</button>
        <button class="event-symbol-btn" data-evento="aniversario" onclick="filtrarPorEvento(this)">🎂 Níver</button>
        <button class="event-symbol-btn" data-evento="pascoa" onclick="filtrarPorEvento(this)">🐰 Páscoa</button>
    </div>

    <div id="criador-form">
        <div class="form-tabs">
            <button class="form-tab-btn active">Adicionar Novo Item / Card</button>
        </div>
        <form id="form-item" onsubmit="adicionarItem(event)">
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">Nome do Item</label>
                    <input type="text" id="nome" class="input-style" placeholder="Ex: Dark Lord" required>
                </div>
                <div class="form-group">
                    <label class="form-label">URL da Imagem</label>
                    <input type="url" id="imagem" class="input-style" placeholder="https://link.com/foto.png" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Categoria</label>
                    <select id="categoria" class="input-style" onchange="ajustarFormEvento(this.value)">
                        <option value="armas">Armas</option>
                        <option value="marretas">Marretas</option>
                        <option value="sets">Sets</option>
                        <option value="evento">Evento</option>
                    </select>
                </div>
                <div class="form-group" id="form-group-evento" style="display: none;">
                    <label class="form-label">Tipo de Evento</label>
                    <select id="tipoEvento" class="input-style">
                        <option value="halloween">🎃 Halloween</option>
                        <option value="natal">🎄 Natal</option>
                        <option value="aniversario">🎂 Aniversário</option>
                        <option value="pascoa">🐰 Páscoa</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Raridade</label>
                    <input type="text" id="raridade" class="input-style" placeholder="Ex: Lendário, Raro" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Cor da Raridade (HEX)</label>
                    <input type="color" id="corRaridade" class="input-style" value="#ffb830" style="height: 37px; padding: 2px; cursor: pointer;">
                </div>
                <div class="form-group">
                    <label class="form-label">Valor (Numérico)</label>
                    <input type="number" id="valor" class="input-style" placeholder="Ex: 5000" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Estabilidade</label>
                    <select id="estabilidade" class="input-style">
                        <option value="subindo">📈 Subindo</option>
                        <option value="estavel">⚖️ Estável</option>
                        <option value="instavel">⚠️ Instável</option>
                        <option value="descendo">📉 Descendo</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Demanda (1 a 5 Estrelas)</label>
                    <select id="demanda" class="input-style">
                        <option value="1">1 Estrela</option>
                        <option value="2">2 Estrelas</option>
                        <option value="3" selected>3 Estrelas</option>
                        <option value="4">4 Estrelas</option>
                        <option value="5">5 Estrelas</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Status (Badge Opcional)</label>
                    <select id="status" class="input-style">
                        <option value="">Nenhum</option>
                        <option value="novo">Novo</option>
                        <option value="raro">Muito Raro</option>
                        <option value="esgotado">Esgotado</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit">Criar Card no Sistema</button>
            </div>
        </form>
    </div>

    <h2 id="titulo-secao">Todos os Itens</h2>

    <div id="container-cards"></div>

    <script>
        let itens = JSON.parse(localStorage.getItem('ftf_items')) || [];
        let categoriaAtual = 'todos';
        let eventoAtual = 'todos';

        // Inicialização do Sistema
        window.addEventListener('DOMContentLoaded', () => {
            const dataSalva = localStorage.getItem('ftf_data_atualizacao');
            if (dataSalva) document.getElementById('dash-data').value = dataSalva;
            filtrarEExibirItens();
        });

        function salvarDados() {
            localStorage.setItem('ftf_items', JSON.stringify(itens));
            localStorage.setItem('ftf_data_atualizacao', document.getElementById('dash-data').value);
            document.getElementById('dash-total-itens').innerText = itens.length;
        }

        function ajustarFormEvento(cat) {
            const grupoEvento = document.getElementById('form-group-evento');
            grupoEvento.style.display = (cat === 'evento') ? 'flex' : 'none';
        }

        function alternarFormulario() {
            const form = document.getElementById('criador-form');
            form.style.display = (form.style.display === 'none') ? 'block' : 'none';
        }

        function mudarCategoria(btn) {
            document.querySelectorAll('.btn-aba').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            categoriaAtual = btn.getAttribute('data-categoria');
            
            const areaEventos = document.getElementById('event-symbols');
            if (categoriaAtual === 'evento') {
                areaEventos.style.display = 'flex';
            } else {
                areaEventos.style.display = 'none';
                eventoAtual = 'todos';
            }
            
            document.getElementById('titulo-secao').innerText = btn.innerText;
            filtrarEExibirItens();
        }

        function filtrarPorEvento(btn) {
            document.querySelectorAll('.event-symbol-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            eventoAtual = btn.getAttribute('data-evento');
            filtrarEExibirItens();
        }

        function adicionarItem(e) {
            e.preventDefault();
            
            const novoItem = {
                id: Date.now(),
                nome: document.getElementById('nome').value,
                imagem: document.getElementById('imagem').value,
                categoria: document.getElementById('categoria').value,
                tipoEvento: document.getElementById('categoria').value === 'evento' ? document.getElementById('tipoEvento').value : '',
                raridade: document.getElementById('raridade').value,
                corRaridade: document.getElementById('corRaridade').value,
                valor: parseFloat(document.getElementById('valor').value) || 0,
                estabilidade: document.getElementById('estabilidade').value,
                demanda: parseInt(document.getElementById('demanda').value),
                status: document.getElementById('status').value
            };

            itens.push(novoItem);
            salvarDados();
            filtrarEExibirItens();
            document.getElementById('form-item').reset();
            ajustarFormEvento('armas');
        }

        function deletarItem(id) {
            itens = itens.filter(item => item.id !== id);
            salvarDados();
            filtrarEExibirItens();
        }

        function alterarValorManual(id, acrescimo) {
            const idx = itens.findIndex(i => i.id === id);
            if (idx !== -1) {
                itens[idx].valor = Math.max(0, itens[idx].valor + acrescimo);
                salvarDados();
                filtrarEExibirItens();
            }
        }

        function filtrarEExibirItens() {
            const busca = document.getElementById('barraPesquisa').value.toLowerCase();
            const ordenacao = document.getElementById('ordenacaoLista').value;

            let filtrados = itens.filter(item => {
                const bateNome = item.nome.toLowerCase().includes(busca);
                const bateCategoria = (categoriaAtual === 'todos' || item.categoria === categoriaAtual);
                const bateEvento = (categoriaAtual !== 'evento' || eventoAtual === 'todos' || item.tipoEvento === eventoAtual);
                return bateNome && bateCategoria && bateEvento;
            });

            // Ordenação
            if (ordenacao === 'nome-asc') {
                filtrados.sort((a, b) => a.nome.localeCompare(b.nome));
            } else if (ordenacao === 'valor-desc') {
                filtrados.sort((a, b) => b.valor - a.valor);
            } else if (ordenacao === 'valor-asc') {
                filtrados.sort((a, b) => a.valor - b.valor);
            } else {
                filtrados.sort((a, b) => b.id - a.id); // Recentes
            }

            renderizarCards(filtrados);
            document.getElementById('dash-total-itens').innerText = itens.length;
        }

        function renderizarCards(lista) {
            const container = document.getElementById('container-cards');
            container.innerHTML = '';

            lista.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'ftf-item-card';

                // Ícone de Estabilidade SVG
                let iconEstabilidade = '';
                if(item.estabilidade === 'subindo') iconEstabilidade = `<span style="color:#22c55e">📈</span>`;
                else if(item.estabilidade === 'descendo') iconEstabilidade = `<span style="color:#ef4444">📉</span>`;
                else if(item.estabilidade === 'instavel') iconEstabilidade = `<span style="color:#eab308">⚠️</span>`;
                else iconEstabilidade = `<span style="color:#94a3b8">⚖️</span>`;

                // Badge de Status
                let badgeHTML = '';
                if(item.status === 'novo') badgeHTML = `<span class="ftf-badge" style="background:#22c55e; color:#000;">NOVO</span>`;
                else if(item.status === 'raro') badgeHTML = `<span class="ftf-badge" style="background:#a855f7; color:#fff;">RARO</span>`;
                else if(item.status === 'esgotado') badgeHTML = `<span class="ftf-badge" style="background:#ef4444; color:#fff;">OFF</span>`;

                // Estrelas de Demanda
                let estrelas = '⭐'.repeat(item.demanda);

                card.innerHTML = `
                    <button class="btn-deletar" onclick="deletarItem(${item.id})">✕</button>
                    <div class="ftf-card-img-wrapper">
                        <span class="txt-posicao-automatica">#${index + 1}</span>
                        <img src="${item.imagem}" alt="${item.nome}" onerror="this.src='https://via.placeholder.com/100?text=FTF'">
                    </div>
                    <div class="ftf-card-info">
                        <h4 class="ftf-item-name">${item.nome}</h4>
                        <span class="ftf-item-rarity" style="color: ${item.corRaridade}">${item.raridade}</span>
                        
                        <div class="box-badge-status">${badgeHTML}</div>

                        <div class="ftf-value-row">
                            <div>
                                <span class="ftf-value-label">Value</span>
                                <div class="box-valor-dinamico">${item.valor.toLocaleString()}</div>
                            </div>
                            <div class="txt-estabilidade">
                                ${iconEstabilidade}
                            </div>
                        </div>

                        <div class="ftf-demand-row">
                            <span class="ftf-value-label">Demanda</span>
                            <div class="txt-demanda-estrelas" style="font-size: 8px;">${estrelas}</div>
                        </div>

                        <div class="btn-acoes-card">
                            <div class="btn-acoes-card-row">
                                <button onclick="alterarValorManual(${item.id}, 500)" style="flex:1">+500</button>
                                <button onclick="alterarValorManual(${item.id}, -500)" style="flex:1">-500</button>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function alternarModoImpressao() {
            document.body.classList.toggle('hide-mode');
        }

        function alternarBotoesCards() {
            document.body.classList.toggle('ocultar-controles-cards');
        }

        function limparTodosItens() {
            if(confirm("Tem certeza que deseja apagar TODOS os cards salvos?")) {
                itens = [];
                salvarDados();
                filtrarEExibirItens();
            }
        }

        function exportarComoImagem() {
            // Prepara a tela escondendo os controles antes do print
            const jaCompacto = document.body.classList.contains('hide-mode');
            const jaSemBotoes = document.body.classList.contains('ocultar-controles-cards');
            
            if(!jaCompacto) document.body.classList.add('hide-mode');
            if(!jaSemBotoes) document.body.classList.add('ocultar-controles-cards');

            setTimeout(() => {
                html2canvas(document.body, {
                    backgroundColor: "#0f1117",
                    useCORS: true,
                    scale: 2
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `ftf-values-${Date.now()}.png`;
                    link.href = canvas.toDataURL();
                    link.click();

                    // Restaura os modos originais do usuário
                    if(!jaCompacto) document.body.classList.remove('hide-mode');
                    if(!jaSemBotoes) document.body.classList.remove('ocultar-controles-cards');
                });
            }, 500);
        }
    </script>
</body>
</html>
